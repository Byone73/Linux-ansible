
- name: 一键部署 Web 服务
  hosts: 127.0.0.1
  connection: local
  gather_facts: no
  become: yes
  
  tasks:
    - name: 创建项目目录
      file:
        path: /opt/myproject
        state: directory

    - name: 复制 docker-compose.yml
      copy:
        src: /home/by/ansible-demo/myproject/docker-compose.yml
        dest: /opt/myproject/docker-compose.yml

    - name: 复制 html 目录
      copy:
        src: /home/by/ansible-demo/myproject/html/
        dest: /opt/myproject/html/

    - name: 停止旧容器
      shell: cd /opt/myproject && docker-compose down 2>/dev/null || true
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: 启动服务
      shell: cd /opt/myproject && docker-compose up -d
      args:
        executable: /bin/bash

